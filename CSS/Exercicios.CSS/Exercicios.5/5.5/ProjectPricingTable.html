<!DOCTYPE html>
<html>
  <head>
    <title>Flexbox Pricing Table</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sono:wght@400;700&display=swap" rel="stylesheet"
    />
    <style>
      body {
        font-family: "Sono", sans-serif;
      }
      .pricing-container{
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .pricing-plan{
        background-color: whitesmoke;
        margin: 15px;
        padding: 20px;
        text-align:center;
      }
      .plan-price{
        font-weight: bold;
        font-size: 3rem;
      }
      .plan-title{
      font-weight: bold;
      font-size: 25px;
      }
      li{
        list-style: none;
        padding: 10px;
      }
      ul{
        padding: 0;
      }
      .plan-button{
        background-color: orange;
        border-radius: 5px;
        padding: 5px;
        color: white;
        border-color: orange;
      }
      

      /* Dica: O que você consegue fazer com media query e flexbox ? */
      @media (max-width: 1250px) {
        .pricing-container{
        justify-content: center;
        flex-direction: column;
      }
      .pricing-plan{
        width: 50% flex;
      }
      }
    </style>
  </head>

  <body>
    <div class="pricing-container">
      <div class="pricing-plan">
        <div class="plan-title">Basic</div>
        <div class="plan-price">$9.99/month</div>
        <ul class="plan-features">
          <li>✅ 10GB Storage</li>
          <li>✅ 1 User</li>
          <li>🚫 Support</li>
        </ul>
        <button class="plan-button">Sign Up</button>
      </div>
      <div class="pricing-plan">
        <div class="plan-title">Standard</div>
        <div class="plan-price">$19.99/month</div>
        <ul class="plan-features">
          <li>✅ 50GB Storage</li>
          <li>✅ 5 Users</li>
          <li>✅ Phone &amp; Email Support</li>
        </ul>
        <button class="plan-button">Sign Up</button>
      </div>
      <div class="pricing-plan">
        <div class="plan-title">Premium</div>
        <div class="plan-price">$49.99/month</div>
        <ul class="plan-features">
          <li>✅ 100GB Storage</li>
          <li>✅ 10 Users</li>
          <li>✅ 24/7 Support</li>
        </ul>
        <button class="plan-button">Sign Up</button>
      </div>
    </div>
  </body>
</html>
