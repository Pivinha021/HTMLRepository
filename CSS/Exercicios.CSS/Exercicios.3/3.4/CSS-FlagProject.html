<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>CSS Flag Project</title>
  <style>
    /* Escreva seu CSS Aqui */
    .flag > p {
        font-size: 80px;
        color: #ffffff;
        margin: 0;
        position: absolute;
        top: 1%;
    }
    div > div > p {
        font-size: 80px;
        text-align: center;
        color: #000000;
    }
    .flag {
        width: 900px;
        height: 600px;
        background-color: #ce1126;
        display: flex;
        flex-direction: column;
        position: relative;
        
    }
    div{
        width: 900px;
        height: 300px;
        background-color: #002868;
        display: flex;
        align-items: center;
        justify-content: center;
        position: absolute center;
      }
      div > div > p{
          width: 200px;
          height: 200px;
          background-color: #fff;
          border-radius: 50%;
          position: relative;
      }
    </style>
</head>

<body>
  <div class="flag">
    <p>The Flag</p>
    <div>
      <div>
        <p>of Laos</p>
      </div>
    </div>
  </div>
</body>

</html>
